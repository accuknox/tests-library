id: BFLA
info:
  name: Broken Function Level Authorization
  description: Tests whether a lower-privileged user can access a function that should require a higher privilege level.
  details: >
    The original API request is replayed with attacker authentication. The test
    reports a finding when the endpoint still returns a successful response,
    indicating that authorization may not be enforced at the function level.
  impact: >
    Attackers may invoke privileged functions such as administrative actions,
    sensitive reads, or destructive operations without the required role.
  category:
    name: BFLA
    shortName: BFLA
    displayName: Broken Function Level Authorization (BFLA)
  subCategory: BFLA
  severity: HIGH
  tags:
    - Business logic
    - OWASP top 10
    - HackerOne top 10
  references:
    - "https://owasp.org/API-Security/editions/2023/en/0xa5-broken-function-level-authorization/"
    - "https://cwe.mitre.org/data/definitions/285.html"
    - "https://cwe.mitre.org/data/definitions/862.html"
  cwe:
    - CWE-285
    - CWE-862

auth:
  authenticated: true

api_selection_filters:
  response_code:
    gte: 200
    lt: 300

execute:
  type: single
  requests:
    - req:
        - replace_auth_header: true

validate:
  response_code:
    gte: 200
    lt: 300
  response_payload:
    length:
      gt: 0
